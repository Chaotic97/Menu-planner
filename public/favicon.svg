<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180" fill="none">
  <rect width="180" height="180" fill="#2e7d32"/>
  <!-- Shadow under stack -->
  <ellipse cx="90" cy="136" rx="50" ry="7" fill="#000" opacity="0.12"/>
  <!-- Plate 4 - bottom -->
  <ellipse cx="90" cy="125" rx="52" ry="12" fill="#1b5e20"/>
  <ellipse cx="90" cy="120" rx="52" ry="12" fill="white" opacity="0.85"/>
  <ellipse cx="90" cy="120" rx="38" ry="8" fill="#2e7d32" opacity="0.15"/>
  <!-- Plate 3 -->
  <ellipse cx="90" cy="103" rx="52" ry="12" fill="#1b5e20"/>
  <ellipse cx="90" cy="98" rx="52" ry="12" fill="white" opacity="0.90"/>
  <ellipse cx="90" cy="98" rx="38" ry="8" fill="#2e7d32" opacity="0.12"/>
  <!-- Plate 2 -->
  <ellipse cx="90" cy="81" rx="52" ry="12" fill="#1b5e20"/>
  <ellipse cx="90" cy="76" rx="52" ry="12" fill="white" opacity="0.95"/>
  <ellipse cx="90" cy="76" rx="38" ry="8" fill="#2e7d32" opacity="0.10"/>
  <!-- Plate 1 - top -->
  <ellipse cx="90" cy="59" rx="52" ry="12" fill="#1b5e20"/>
  <ellipse cx="90" cy="54" rx="52" ry="12" fill="white"/>
  <!-- Top plate well -->
  <ellipse cx="90" cy="54" rx="38" ry="8" fill="none" stroke="#2e7d32" stroke-width="1.5" opacity="0.18"/>
  <!-- Highlight -->
  <ellipse cx="80" cy="51" rx="14" ry="4" fill="white" opacity="0.3"/>
</svg>
