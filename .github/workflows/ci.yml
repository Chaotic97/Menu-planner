name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: platestack
          POSTGRES_PASSWORD: platestack
          POSTGRES_DB: platestack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U platestack"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [20, 22]

    env:
      DATABASE_URL: postgresql://platestack:platestack@localhost:5432/platestack_test
      TEST_DATABASE_URL: postgresql://platestack:platestack@localhost:5432/platestack_test

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create citext extension
        run: PGPASSWORD=platestack psql -h localhost -U platestack -d platestack_test -c "CREATE EXTENSION IF NOT EXISTS citext;"

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
